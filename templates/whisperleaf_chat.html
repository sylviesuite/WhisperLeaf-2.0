<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WhisperLeaf Chat</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, sans-serif;
      background: linear-gradient(160deg, #0f1419 0%, #1a2332 40%, #0d1117 100%);
      color: #e6edf3;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .card {
      width: 100%;
      max-width: 800px;
      background: rgba(22, 27, 34, 0.85);
      border: 1px solid rgba(48, 54, 61, 0.8);
      border-radius: 12px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.35);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      max-height: 85vh;
    }

    .chat-owl {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 12px 0 4px;
      flex-shrink: 0;
    }

    .chat-owl .owl-icon-wrap {
      display: inline-block;
      line-height: 0;
      border-radius: 50%;
      overflow: hidden;
      background: transparent;
      cursor: pointer;
    }

    .chat-owl .owl-icon {
      width: 56px;
      height: 56px;
      object-fit: cover;
      display: block;
      border-radius: 50%;
    }

    .chat-owl .owl-icon-wrap.owl-thinking {
      animation: owlThinkingPulse 1.4s ease-in-out infinite;
    }

    @keyframes owlThinkingPulse {
      0%   { transform: scale(1); box-shadow: 0 0 0 rgba(120,255,180,0); }
      50%  { transform: scale(1.04); box-shadow: 0 0 14px rgba(120,255,180,0.25); }
      100% { transform: scale(1); box-shadow: 0 0 0 rgba(120,255,180,0); }
    }

    @media (prefers-reduced-motion: reduce) {
      .chat-owl .owl-icon-wrap.owl-thinking {
        animation: none;
      }
    }

    .card-header {
      padding: 8px 1.25rem 8px;
      border-bottom: 1px solid rgba(48, 54, 61, 0.6);
      font-weight: 600;
      font-size: 1rem;
      letter-spacing: 0.02em;
    }

    /* Mode toggle row under header */
    .mode-toggle {
      display: flex;
      justify-content: center;
      gap: 0.5rem;
      margin-top: 6px;
      margin-bottom: 12px;
      padding: 0 1.25rem;
      border-bottom: 1px solid rgba(48, 54, 61, 0.6);
    }

    .mode-button {
      padding: 0.35rem 0.9rem;
      border-radius: 999px;
      border: 1px solid rgba(99, 110, 123, 0.7);
      background: rgba(13, 17, 23, 0.9);
      color: #c9d1d9;
      font-size: 0.78rem;
      letter-spacing: 0.03em;
      text-transform: uppercase;
      cursor: pointer;
      transition:
        background 0.15s ease,
        border-color 0.15s ease,
        color 0.15s ease;
    }

    .mode-button.active {
      background: rgba(35, 134, 54, 0.25);
      border-color: rgba(46, 160, 67, 0.8);
      color: #f0f6fc;
    }

    .chat-window {
      flex: 1 1 0%;
      min-height: 0;
      overflow-y: auto;
      padding: 12px 16px 20px;
    }

    .chat-window .messages-inner {
      max-width: 760px;
      margin: 0 auto;
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .message {
      max-width: 100%;
      padding: 0.6rem 0.9rem;
      border-radius: 12px;
      font-size: 0.9rem;
      line-height: 1.45;
    }

    .message.user {
      align-self: flex-end;
      background: rgba(56, 139, 253, 0.25);
      border: 1px solid rgba(56, 139, 253, 0.35);
    }

    .message.assistant {
      align-self: flex-start;
      background: rgba(35, 134, 54, 0.15);
      border: 1px solid rgba(35, 134, 54, 0.3);
    }

    .message.error {
      align-self: flex-start;
      background: rgba(248, 81, 73, 0.15);
      border: 1px solid rgba(248, 81, 73, 0.35);
    }

    .input-row {
      display: flex;
      gap: 0.5rem;
      margin-top: 8px;
      padding: 1rem 1.25rem;
      border-top: 1px solid rgba(48, 54, 61, 0.6);
    }

    .input-row input {
      flex: 1;
      padding: 0.6rem 0.9rem;
      border: 1px solid rgba(48, 54, 61, 0.8);
      border-radius: 8px;
      background: #0d1117;
      color: #e6edf3;
      font-size: 0.9rem;
    }

    .input-row input::placeholder {
      color: #6e7681;
    }

    .input-row input:focus {
      outline: none;
      border-color: #58a6ff;
    }

    .btn {
      padding: 0.6rem 1rem;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      border: 1px solid rgba(48, 54, 61, 0.8);
      background: #21262d;
      color: #e6edf3;
      transition: background 0.15s ease;
    }

    .btn:hover {
      background: #30363d;
    }

    .btn-send {
      background: rgba(46, 160, 67, 0.25);
      border-color: rgba(46, 160, 67, 0.5);
    }

    .btn-send:hover {
      background: rgba(46, 160, 67, 0.4);
    }

    .footer {
      padding: 0.5rem 1.25rem 1rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    .status {
      font-size: 0.75rem;
      color: #8b949e;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="chat-owl" aria-hidden="true">
      <span id="chatOwl" class="owl-icon-wrap">
        <img src="/static/owl.png" alt="WhisperLeaf" class="owl-icon" />
      </span>
    </div>
    <div class="card-header">WhisperLeaf Chat</div>

    <!-- Mode selector -->
    <div class="mode-toggle">
      <button class="mode-button active" data-mode="system">Sovereign</button>
      <button class="mode-button" data-mode="builder">Builder</button>
      <button class="mode-button" data-mode="structural">Structural</button>
    </div>

    <div class="chat-window">
      <div class="messages-inner" id="chatWindow"></div>
    </div>

    <div class="input-row">
      <input
        type="text"
        id="messageInput"
        placeholder="Type a message..."
        autocomplete="off"
      />
      <button class="btn btn-send" id="sendBtn">Send</button>
    </div>

    <div class="footer">
      <span class="status">Running locally on your machine</span>
      <button class="btn" id="clearBtn">Clear</button>
    </div>
  </div>

  <script>
    const chatMessages = document.querySelector('.chat-window');
    const chatWindow = document.getElementById('chatWindow');
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');
    const clearBtn = document.getElementById('clearBtn');
    const chatOwl = document.getElementById('chatOwl');
    const modeButtons = document.querySelectorAll('.mode-button');

    if (chatOwl) {
      chatOwl.addEventListener('click', function () {
        window.location.href = '/';
      });
    }

    function isNearBottom(container, threshold = 100) {
      if (!container) return true;
      return (
        container.scrollHeight -
          container.scrollTop -
          container.clientHeight <
        threshold
      );
    }

    function scrollToBottom(container) {
      if (!container) return;
      container.scrollTo({
        top: container.scrollHeight,
        behavior: 'smooth',
      });
    }

    let sessionId = null;
    // Sovereign/system mode by default
    let selectedMode = 'system';
  // In-browser conversation history (user + assistant turns)
  let history = [];

    // Mode button behavior
    modeButtons.forEach((btn) => {
      btn.addEventListener('click', () => {
        modeButtons.forEach((b) => b.classList.remove('active'));
        btn.classList.add('active');
        selectedMode = btn.getAttribute('data-mode') || 'system';
      });
    });

    function appendMessage(text, role) {
      if (!text) return;
      const div = document.createElement('div');
      div.className = 'message ' + role;
      div.textContent = text;
      chatWindow.appendChild(div);
      if (isNearBottom(chatMessages)) {
        scrollToBottom(chatMessages);
      }
    }

    function stopOwlThinking() {
      if (chatOwl) chatOwl.classList.remove('owl-thinking');
    }

    async function sendMessage() {
      const text = (messageInput.value || '').trim();
      if (!text) return;

      messageInput.value = '';
      appendMessage(text, 'user');
      history.push({ role: 'user', content: text });

      sendBtn.disabled = true;
      if (chatOwl) chatOwl.classList.add('owl-thinking');
      try {
        const body = {
          message: text,
          history: history
        };

        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });

        if (!res.ok) {
          stopOwlThinking();
          const err = await res.json().catch(() => ({}));
          appendMessage(err.detail || 'Request failed', 'error');
          sendBtn.disabled = false;
          return;
        }

        if (!res.body) {
          stopOwlThinking();
          appendMessage('No response body', 'error');
          sendBtn.disabled = false;
          return;
        }

        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let fullReply = '';
        let buffer = '';

        while (true) {
          const { value, done } = await reader.read();
          if (done) break;
          buffer += decoder.decode(value, { stream: true });
          const parts = buffer.split('\n\n');
          buffer = parts.pop() || '';
          for (const part of parts) {
            const eventMatch = part.match(/^event:\s*(\S+)/m);
            const dataMatch = part.match(/^data:\s*(.*)/ms);
            const event = eventMatch ? eventMatch[1] : '';
            const rawData = dataMatch ? dataMatch[1] : '';
            if (event === 'chunk') {
              fullReply += rawData;
            } else if (event === 'done') {
              stopOwlThinking();
              appendMessage(fullReply || '', 'assistant');
              history.push({ role: 'assistant', content: fullReply || '' });
              sendBtn.disabled = false;
              return;
            } else if (event === 'error') {
              stopOwlThinking();
              appendMessage(rawData.trim() || 'Error', 'error');
              sendBtn.disabled = false;
              return;
            }
          }
        }

        if (buffer) {
          const eventMatch = buffer.match(/^event:\s*(\S+)/m);
          const dataMatch = buffer.match(/^data:\s*(.*)/ms);
          const event = eventMatch ? eventMatch[1] : '';
          const rawData = dataMatch ? dataMatch[1] : '';
          if (event === 'chunk') fullReply += rawData;
          else if (event === 'error') {
            stopOwlThinking();
            appendMessage(rawData.trim() || 'Error', 'error');
            sendBtn.disabled = false;
            return;
          }
        }

        stopOwlThinking();
        appendMessage(fullReply || '', 'assistant');
        history.push({ role: 'assistant', content: fullReply || '' });
      } catch (e) {
        stopOwlThinking();
        appendMessage('Network error: ' + e.message, 'error');
      }
      sendBtn.disabled = false;
    }

    sendBtn.addEventListener('click', sendMessage);

    // Enter = send, Shift+Enter = newline (for future textarea swap)
    messageInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    clearBtn.addEventListener('click', () => {
      chatWindow.innerHTML = '';
      history = [];
    });
  </script>
</body>
</html>
