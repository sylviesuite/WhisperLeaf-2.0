<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WhisperLeaf Chat</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, sans-serif;
      background: linear-gradient(160deg, #0f1419 0%, #1a2332 40%, #0d1117 100%);
      color: #e6edf3;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .card {
      width: 100%;
      max-width: 800px;
      background: rgba(22, 27, 34, 0.85);
      border: 1px solid rgba(48, 54, 61, 0.8);
      border-radius: 12px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.35);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      max-height: 85vh;
    }

    .chat-owl {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 12px 0 4px;
      flex-shrink: 0;
    }

    .chat-owl .owl-icon-wrap {
      display: inline-block;
      line-height: 0;
      border-radius: 50%;
      overflow: hidden;
      background: transparent;
      cursor: pointer;
    }

    .chat-owl .owl-icon {
      width: 56px;
      height: 56px;
      object-fit: cover;
      display: block;
      border-radius: 50%;
    }

    .chat-owl .owl-icon-wrap.owl-thinking {
      animation: owlThinkingPulse 1.4s ease-in-out infinite;
    }

    @keyframes owlThinkingPulse {
      0%   { transform: scale(1); box-shadow: 0 0 0 rgba(120,255,180,0); }
      50%  { transform: scale(1.04); box-shadow: 0 0 14px rgba(120,255,180,0.25); }
      100% { transform: scale(1); box-shadow: 0 0 0 rgba(120,255,180,0); }
    }

    @media (prefers-reduced-motion: reduce) {
      .chat-owl .owl-icon-wrap.owl-thinking {
        animation: none;
      }
    }

    .card-header {
      padding: 8px 1.25rem 8px;
      border-bottom: 1px solid rgba(48, 54, 61, 0.6);
      font-weight: 600;
      font-size: 1rem;
      letter-spacing: 0.02em;
    }

    /* Mode toggle row under header */
    .mode-toggle {
      display: flex;
      justify-content: center;
      gap: 0.5rem;
      margin-top: 6px;
      margin-bottom: 12px;
      padding: 0 1.25rem;
      border-bottom: 1px solid rgba(48, 54, 61, 0.6);
    }

    .mode-button {
      padding: 0.35rem 0.9rem;
      border-radius: 999px;
      border: 1px solid rgba(99, 110, 123, 0.7);
      background: rgba(13, 17, 23, 0.9);
      color: #c9d1d9;
      font-size: 0.78rem;
      letter-spacing: 0.03em;
      text-transform: uppercase;
      cursor: pointer;
      transition:
        background 0.15s ease,
        border-color 0.15s ease,
        color 0.15s ease;
    }

    .mode-button.active {
      background: rgba(35, 134, 54, 0.25);
      border-color: rgba(46, 160, 67, 0.8);
      color: #f0f6fc;
    }

    .chat-window {
      flex: 1 1 0%;
      min-height: 0;
      overflow-y: auto;
      padding: 12px 16px 20px;
      position: relative;
    }

    .chat-window .messages-inner {
      max-width: 760px;
      margin: 0 auto;
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    /* Bulletproof streaming message text */
    .message {
      max-width: 100%;
      padding: 0.6rem 0.9rem;
      border-radius: 12px;
      font-size: 0.9rem;
      white-space: pre-wrap;
      word-break: break-word;
      overflow-wrap: anywhere;
      line-height: 1.45;
      animation: fadeInMessage 0.18s ease;
    }

    @keyframes fadeInMessage {
      from { opacity: 0; transform: translateY(4px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (prefers-reduced-motion: reduce) {
      .message { animation: none; }
    }

    .message p {
      margin: 0.5em 0;
    }

    .message code {
      font-family: monospace;
      background: rgba(255, 255, 255, 0.06);
      padding: 2px 4px;
      border-radius: 4px;
    }

    .message.user {
      align-self: flex-end;
      background: rgba(56, 139, 253, 0.25);
      border: 1px solid rgba(56, 139, 253, 0.35);
    }

    .message.assistant {
      align-self: flex-start;
      background: rgba(35, 134, 54, 0.15);
      border: 1px solid rgba(35, 134, 54, 0.3);
    }

    .message.error {
      align-self: flex-start;
      background: rgba(248, 81, 73, 0.15);
      border: 1px solid rgba(248, 81, 73, 0.35);
    }

    .streaming-cursor {
      display: inline-block;
      margin-left: 2px;
      animation: blink 1s steps(1) infinite;
    }

    @keyframes blink {
      50% { opacity: 0; }
    }

    .input-row {
      display: flex;
      gap: 0.5rem;
      margin-top: 8px;
      padding: 1rem 1.25rem;
      border-top: 1px solid rgba(48, 54, 61, 0.6);
    }

    .input-row textarea,
    .input-row input {
      flex: 1;
      padding: 0.6rem 0.9rem;
      border: 1px solid rgba(48, 54, 61, 0.8);
      border-radius: 8px;
      background: #0d1117;
      color: #e6edf3;
      font-size: 0.9rem;
      font-family: inherit;
      resize: none;
      min-height: 2.5rem;
      max-height: 8rem;
      overflow-y: auto;
    }

    .input-row textarea::placeholder,
    .input-row input::placeholder {
      color: #6e7681;
    }

    .input-row textarea:focus,
    .input-row input:focus {
      outline: none;
      border-color: #58a6ff;
    }

    .message-wrap {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 0.5rem;
      width: 100%;
    }

    .message-body {
      flex: 1;
      min-width: 0;
    }

    .btn-copy-msg {
      flex-shrink: 0;
      padding: 0.25rem 0.5rem;
      font-size: 0.75rem;
      border-radius: 6px;
      border: 1px solid rgba(48, 54, 61, 0.8);
      background: rgba(33, 38, 45, 0.9);
      color: #8b949e;
      cursor: pointer;
    }

    .btn-copy-msg:hover {
      color: #e6edf3;
      background: rgba(48, 54, 61, 0.9);
    }

    .btn-jump-bottom {
      position: absolute;
      bottom: 1rem;
      right: 1rem;
      padding: 0.4rem 0.75rem;
      font-size: 0.8rem;
      border-radius: 8px;
      border: 1px solid rgba(48, 54, 61, 0.8);
      background: rgba(22, 27, 34, 0.95);
      color: #c9d1d9;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
    }

    .btn-jump-bottom:hover {
      background: rgba(48, 54, 61, 0.95);
      color: #e6edf3;
    }

    .btn-jump-bottom.hidden {
      display: none;
    }

    .btn {
      padding: 0.6rem 1rem;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      border: 1px solid rgba(48, 54, 61, 0.8);
      background: #21262d;
      color: #e6edf3;
      transition: background 0.15s ease;
    }

    .btn:hover {
      background: #30363d;
    }

    .btn-send {
      background: rgba(46, 160, 67, 0.25);
      border-color: rgba(46, 160, 67, 0.5);
    }

    .btn-send:hover {
      background: rgba(46, 160, 67, 0.4);
    }

    .footer {
      padding: 0.5rem 1.25rem 1rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    .status {
      font-size: 0.75rem;
      color: #8b949e;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="chat-owl" aria-hidden="true">
      <span id="chatOwl" class="owl-icon-wrap">
        <img src="/static/owl.png" alt="WhisperLeaf" class="owl-icon" />
      </span>
    </div>
    <div class="card-header">WhisperLeaf Chat</div>

    <!-- Mode selector -->
    <div class="mode-toggle">
      <button class="mode-button active" data-mode="system">Sovereign</button>
      <button class="mode-button" data-mode="builder">Builder</button>
      <button class="mode-button" data-mode="structural">Structural</button>
    </div>

    <div class="chat-window">
      <div class="messages-inner" id="chatWindow"></div>
      <button type="button" class="btn-jump-bottom hidden" id="jumpBottomBtn" aria-label="Jump to latest">Jump to latest</button>
    </div>

    <form id="chatForm" class="input-row" aria-label="Send message">
      <textarea
        id="messageInput"
        placeholder="Type a message... (Enter to send, Shift+Enter for newline)"
        autocomplete="off"
        aria-label="Message"
        rows="1"
     ></textarea>
      <button type="submit" class="btn btn-send" id="sendBtn">Send</button>
    </form>

    <div class="footer">
      <span class="status">Running locally on your machine</span>
      <button class="btn" id="clearBtn">Clear</button>
    </div>
  </div>

  <script>
    // --- DOM refs
    const chatMessages = document.querySelector('.chat-window');
    const chatWindow = document.getElementById('chatWindow');
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');
    const clearBtn = document.getElementById('clearBtn');
    const chatForm = document.getElementById('chatForm');
    const jumpBottomBtn = document.getElementById('jumpBottomBtn');
    const chatOwl = document.getElementById('chatOwl');
    const owl = document.querySelector('.owl-icon-wrap');
    const modeButtons = document.querySelectorAll('.mode-button');

    // --- Session and state
    let sessionId = sessionStorage.getItem('whisperleaf_session_id') || crypto.randomUUID();
    sessionStorage.setItem('whisperleaf_session_id', sessionId);
    let selectedMode = 'system';
    let history = [];
    let isSending = false;
    let currentStreamingBubble = null;
    let streamWatchdog = null;

    function startWatchdog() {
      clearTimeout(streamWatchdog);
      streamWatchdog = setTimeout(() => {
        console.warn("Stream watchdog triggered");
        stopThinking();
        setSendingState(false);
      }, 25000);
    }

    function stopWatchdog() {
      clearTimeout(streamWatchdog);
    }

    function setSendingState(sending) {
      isSending = sending;
      sendBtn.disabled = sending;
    }

    // --- Owl
    function startThinking() {
      if (owl) owl.classList.add('owl-thinking');
    }
    function stopThinking() {
      if (owl) owl.classList.remove('owl-thinking');
    }

    if (chatOwl) {
      chatOwl.addEventListener('click', function () {
        window.location.href = '/';
      });
    }

    // --- Scroll
    function isNearBottom(container, threshold = 100) {
      if (!container) return true;
      return container.scrollHeight - container.scrollTop - container.clientHeight < threshold;
    }
    function scrollToBottom(container) {
      if (!container) return;
      container.scrollTo({ top: container.scrollHeight, behavior: 'smooth' });
    }
    function scrollToBottomIfNearBottom() {
      if (isNearBottom(chatMessages)) scrollToBottom(chatMessages);
    }

    function updateScrollButtonVisibility() {
      if (!jumpBottomBtn) return;
      jumpBottomBtn.classList.toggle('hidden', isNearBottom(chatMessages));
    }

    // --- Message rendering (isolated from transport)
    function addCopyButtonToBubble(bubble, getText) {
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'btn-copy-msg';
      btn.textContent = 'Copy';
      btn.addEventListener('click', function () {
        const text = typeof getText === 'function' ? getText() : getText;
        if (text != null) navigator.clipboard.writeText(String(text)).catch(function () {});
      });
      bubble.appendChild(btn);
    }

    function appendMessage(role, text) {
      if (!text && role !== 'assistant') return;
      const div = document.createElement('div');
      div.className = 'message ' + role;
      if (role === 'assistant') {
        const wrap = document.createElement('div');
        wrap.className = 'message-wrap';
        const body = document.createElement('span');
        body.className = 'message-body';
        body.textContent = text || '';
        wrap.appendChild(body);
        addCopyButtonToBubble(wrap, function () { return body.textContent; });
        div.appendChild(wrap);
      } else {
        div.textContent = text || '';
      }
      chatWindow.appendChild(div);
      scrollToBottomIfNearBottom();
      updateScrollButtonVisibility();
    }

    function createStreamingBubble() {
      const div = document.createElement('div');
      div.className = 'message assistant';
      const textSpan = document.createElement('span');
      textSpan.className = 'streaming-text';
      textSpan.textContent = '';
      const cursorSpan = document.createElement('span');
      cursorSpan.className = 'streaming-cursor';
      cursorSpan.textContent = '\u258C';
      div.appendChild(textSpan);
      div.appendChild(cursorSpan);
      chatWindow.appendChild(div);
      currentStreamingBubble = div;
      scrollToBottomIfNearBottom();
      return div;
    }

    function updateStreamingBubble(textChunk) {
      if (!currentStreamingBubble) return;
      const textEl = currentStreamingBubble.querySelector('.streaming-text');
      if (textEl) textEl.textContent = textChunk;
      scrollToBottomIfNearBottom();
      updateScrollButtonVisibility();
    }

    function finalizeStreamingBubble() {
      if (currentStreamingBubble) {
        const cursor = currentStreamingBubble.querySelector('.streaming-cursor');
        if (cursor) cursor.remove();
        const textEl = currentStreamingBubble.querySelector('.streaming-text');
        const content = textEl ? textEl.textContent : '';
        const wrap = document.createElement('div');
        wrap.className = 'message-wrap';
        const body = document.createElement('span');
        body.className = 'message-body';
        body.textContent = content;
        wrap.appendChild(body);
        addCopyButtonToBubble(wrap, function () { return body.textContent; });
        currentStreamingBubble.innerHTML = '';
        currentStreamingBubble.appendChild(wrap);
      }
      currentStreamingBubble = null;
    }

    function setStreamingBubbleError(message) {
      if (currentStreamingBubble) {
        currentStreamingBubble.className = 'message error';
        currentStreamingBubble.textContent = message || 'Error';
      }
      finalizeStreamingBubble();
    }

    // --- Session history
    async function loadSessionHistory() {
      try {
        const res = await fetch(`/api/chat/history?session_id=${encodeURIComponent(sessionId)}`);
        if (!res.ok) return;
        const data = await res.json();
        const list = data.history || [];
        if (list.length === 0) return;
        chatWindow.innerHTML = '';
        history = list;
        for (const msg of list) {
          if (msg.role) appendMessage(msg.role, msg.content || '');
        }
        if (history.length > 0) scrollToBottomIfNearBottom();
        updateScrollButtonVisibility();
      } catch (_) {}
    }

    async function clearChat() {
      try {
        await fetch('/api/chat/clear', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ session_id: sessionId })
        });
      } catch (_) {}
      chatWindow.innerHTML = '';
      history = [];
    }

    // --- SSE: chunk/heartbeat-safe parsing (no raw "data:" in UI, [DONE] stops cleanly)
    function parseSSEBlock(block) {
      const lines = block.split(/\r?\n/);
      let event = '';
      const dataLines = [];
      for (const line of lines) {
        const trimmed = line.trim();
        if (trimmed.startsWith('event:')) {
          event = trimmed.replace(/^event:\s*/, '').trim();
        } else if (trimmed.startsWith('data:')) {
          dataLines.push(trimmed.replace(/^data:\s?/, ''));
        }
      }
      const data = dataLines.join('\n');
      if (!event && !data) return null;
      if (data.trim() === '[DONE]') return { event: 'done', data: '' };
      return { event, data };
    }

    function processStreamBuffer(buffer) {
      const parts = buffer.split(/\n\n+/);
      const remainder = parts.pop() || '';
      return { blocks: parts, remainder };
    }

    // --- Single send path (form submit only; guarded by isSending)
    async function sendMessage() {
      if (isSending) return;
      const text = (messageInput.value || '').trim();
      if (!text) return;

      setSendingState(true);
      messageInput.value = '';
      messageInput.style.height = 'auto';
      appendMessage('user', text);
      history.push({ role: 'user', content: text });
      startThinking();
      createStreamingBubble();
      startWatchdog();

      try {
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: text, history: history, session_id: sessionId })
        });

        if (!res.ok) {
          stopWatchdog();
          stopThinking();
          const err = await res.json().catch(function () { return {}; });
          setStreamingBubbleError(err.detail || 'Request failed');
          return;
        }

        if (!res.body) {
          stopWatchdog();
          stopThinking();
          setStreamingBubbleError('No response body');
          return;
        }

        const reader = res.body.getReader();
        const decoder = new TextDecoder('utf-8');
        let fullReply = '';
        let buffer = '';

        while (true) {
          const { value, done } = await reader.read();
          if (done) break;
          buffer += decoder.decode(value, { stream: true });
          const { blocks, remainder } = processStreamBuffer(buffer);
          buffer = remainder;

          for (const block of blocks) {
            const parsed = parseSSEBlock(block);
            if (parsed === null) continue;
            const { event, data } = parsed;

            if (event === 'chunk' && data !== undefined) {
              fullReply += data;
              updateStreamingBubble(fullReply);
            } else if (event === 'done') {
              stopWatchdog();
              stopThinking();
              history.push({ role: 'assistant', content: fullReply || '' });
              finalizeStreamingBubble();
              return;
            } else if (event === 'error') {
              stopWatchdog();
              stopThinking();
              setStreamingBubbleError((data || '').trim() || 'Error');
              return;
            }
          }
        }

        // Flush remaining buffer as one event if present
        if (buffer.trim()) {
          const parsed = parseSSEBlock(buffer);
          if (parsed !== null) {
            const { event, data } = parsed;
            if (event === 'chunk' && data !== undefined) {
              fullReply += data;
              updateStreamingBubble(fullReply);
            } else if (event === 'error') {
              stopWatchdog();
              stopThinking();
              setStreamingBubbleError((data || '').trim() || 'Error');
              return;
            }
          }
        }

        stopWatchdog();
        stopThinking();
        history.push({ role: 'assistant', content: fullReply || '' });
        finalizeStreamingBubble();
      } catch (e) {
        stopWatchdog();
        stopThinking();
        setStreamingBubbleError('Network error: ' + (e && e.message ? e.message : 'Unknown error'));
      } finally {
        setSendingState(false);
      }
    }

    // --- Form submit only (Enter and button click both go through form)
    if (chatForm) {
      chatForm.addEventListener('submit', function (e) {
        e.preventDefault();
        sendMessage();
      });
    }

    // Enter sends, Shift+Enter newline; request lock prevents double send
    if (messageInput) {
      messageInput.addEventListener('keydown', function (e) {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          sendMessage();
        }
      });
      messageInput.addEventListener('input', function () {
        messageInput.style.height = 'auto';
        messageInput.style.height = Math.min(messageInput.scrollHeight, 8 * 16) + 'px';
      });
    }

    if (chatMessages && jumpBottomBtn) {
      chatMessages.addEventListener('scroll', updateScrollButtonVisibility);
      jumpBottomBtn.addEventListener('click', function () {
        scrollToBottom(chatMessages);
        updateScrollButtonVisibility();
      });
    }

    clearBtn.addEventListener('click', function () {
      clearChat();
    });

    // Mode buttons
    modeButtons.forEach(function (btn) {
      btn.addEventListener('click', function () {
        modeButtons.forEach(function (b) { b.classList.remove('active'); });
        btn.classList.add('active');
        selectedMode = btn.getAttribute('data-mode') || 'system';
      });
    });

    loadSessionHistory();
  </script>
</body>
</html>
