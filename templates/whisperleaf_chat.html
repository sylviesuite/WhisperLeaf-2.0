<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WhisperLeaf Chat</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, sans-serif;
      background: linear-gradient(160deg, #0f1419 0%, #1a2332 40%, #0d1117 100%);
      color: #e6edf3;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .card {
      width: 100%;
      max-width: 800px;
      background: rgba(22, 27, 34, 0.85);
      border: 1px solid rgba(48, 54, 61, 0.8);
      border-radius: 12px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.35);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      max-height: 85vh;
    }

    .chat-owl {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 12px 0 4px;
      flex-shrink: 0;
    }

    .chat-owl .owl-icon-wrap {
      display: inline-block;
      line-height: 0;
      border-radius: 50%;
      overflow: hidden;
      background: transparent;
      cursor: pointer;
    }

    .chat-owl .owl-icon {
      width: 56px;
      height: 56px;
      object-fit: cover;
      display: block;
      border-radius: 50%;
    }

    .chat-owl .owl-icon-wrap.owl-thinking {
      animation: owlThinkingPulse 1.4s ease-in-out infinite;
    }

    @keyframes owlThinkingPulse {
      0%   { transform: scale(1); box-shadow: 0 0 0 rgba(120,255,180,0); }
      50%  { transform: scale(1.04); box-shadow: 0 0 14px rgba(120,255,180,0.25); }
      100% { transform: scale(1); box-shadow: 0 0 0 rgba(120,255,180,0); }
    }

    @media (prefers-reduced-motion: reduce) {
      .chat-owl .owl-icon-wrap.owl-thinking {
        animation: none;
      }
    }

    .card-header {
      padding: 8px 1.25rem 8px;
      border-bottom: 1px solid rgba(48, 54, 61, 0.6);
      font-weight: 600;
      font-size: 1rem;
      letter-spacing: 0.02em;
    }

    /* Mode toggle row under header */
    .mode-toggle {
      display: flex;
      justify-content: center;
      gap: 0.5rem;
      margin-top: 6px;
      margin-bottom: 12px;
      padding: 0 1.25rem;
      border-bottom: 1px solid rgba(48, 54, 61, 0.6);
    }

    .mode-button {
      padding: 0.35rem 0.9rem;
      border-radius: 999px;
      border: 1px solid rgba(99, 110, 123, 0.7);
      background: rgba(13, 17, 23, 0.9);
      color: #c9d1d9;
      font-size: 0.78rem;
      letter-spacing: 0.03em;
      text-transform: uppercase;
      cursor: pointer;
      transition:
        background 0.15s ease,
        border-color 0.15s ease,
        color 0.15s ease;
    }

    .mode-button.active {
      background: rgba(35, 134, 54, 0.25);
      border-color: rgba(46, 160, 67, 0.8);
      color: #f0f6fc;
    }

    .chat-window {
      flex: 1 1 0%;
      min-height: 0;
      overflow-y: auto;
      padding: 12px 16px 20px;
    }

    .chat-window .messages-inner {
      max-width: 760px;
      margin: 0 auto;
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .message {
      max-width: 100%;
      padding: 0.6rem 0.9rem;
      border-radius: 12px;
      font-size: 0.9rem;
      line-height: 1.45;
    }

    .message.user {
      align-self: flex-end;
      background: rgba(56, 139, 253, 0.25);
      border: 1px solid rgba(56, 139, 253, 0.35);
    }

    .message.assistant {
      align-self: flex-start;
      background: rgba(35, 134, 54, 0.15);
      border: 1px solid rgba(35, 134, 54, 0.3);
    }

    .message.error {
      align-self: flex-start;
      background: rgba(248, 81, 73, 0.15);
      border: 1px solid rgba(248, 81, 73, 0.35);
    }

    .input-row {
      display: flex;
      gap: 0.5rem;
      margin-top: 8px;
      padding: 1rem 1.25rem;
      border-top: 1px solid rgba(48, 54, 61, 0.6);
    }

    .input-row input {
      flex: 1;
      padding: 0.6rem 0.9rem;
      border: 1px solid rgba(48, 54, 61, 0.8);
      border-radius: 8px;
      background: #0d1117;
      color: #e6edf3;
      font-size: 0.9rem;
    }

    .input-row input::placeholder {
      color: #6e7681;
    }

    .input-row input:focus {
      outline: none;
      border-color: #58a6ff;
    }

    .btn {
      padding: 0.6rem 1rem;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      border: 1px solid rgba(48, 54, 61, 0.8);
      background: #21262d;
      color: #e6edf3;
      transition: background 0.15s ease;
    }

    .btn:hover {
      background: #30363d;
    }

    .btn-send {
      background: rgba(46, 160, 67, 0.25);
      border-color: rgba(46, 160, 67, 0.5);
    }

    .btn-send:hover {
      background: rgba(46, 160, 67, 0.4);
    }

    .footer {
      padding: 0.5rem 1.25rem 1rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    .status {
      font-size: 0.75rem;
      color: #8b949e;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="chat-owl" aria-hidden="true">
      <span id="chatOwl" class="owl-icon-wrap">
        <img src="/static/owl.png" alt="WhisperLeaf" class="owl-icon" />
      </span>
    </div>
    <div class="card-header">WhisperLeaf Chat</div>

    <!-- Mode selector -->
    <div class="mode-toggle">
      <button class="mode-button active" data-mode="system">Sovereign</button>
      <button class="mode-button" data-mode="builder">Builder</button>
      <button class="mode-button" data-mode="structural">Structural</button>
    </div>

    <div class="chat-window">
      <div class="messages-inner" id="chatWindow"></div>
    </div>

    <form id="chatForm" class="input-row" aria-label="Send message">
      <input
        type="text"
        id="messageInput"
        placeholder="Type a message..."
        autocomplete="off"
        aria-label="Message"
      />
      <button type="submit" class="btn btn-send" id="sendBtn">Send</button>
    </form>

    <div class="footer">
      <span class="status">Running locally on your machine</span>
      <button class="btn" id="clearBtn">Clear</button>
    </div>
  </div>

  <script>
    // --- DOM refs
    const chatMessages = document.querySelector('.chat-window');
    const chatWindow = document.getElementById('chatWindow');
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');
    const clearBtn = document.getElementById('clearBtn');
    const chatForm = document.getElementById('chatForm');
    const chatOwl = document.getElementById('chatOwl');
    const owl = document.querySelector('.owl-icon-wrap');
    const modeButtons = document.querySelectorAll('.mode-button');

    // --- Session and state
    let sessionId = sessionStorage.getItem('whisperleaf_session_id') || crypto.randomUUID();
    sessionStorage.setItem('whisperleaf_session_id', sessionId);
    let selectedMode = 'system';
    let history = [];
    let isSending = false;
    let currentStreamingBubble = null;

    // --- Owl
    function startThinking() {
      if (owl) owl.classList.add('owl-thinking');
    }
    function stopThinking() {
      if (owl) owl.classList.remove('owl-thinking');
    }

    if (chatOwl) {
      chatOwl.addEventListener('click', function () {
        window.location.href = '/';
      });
    }

    // --- Scroll
    function isNearBottom(container, threshold = 100) {
      if (!container) return true;
      return container.scrollHeight - container.scrollTop - container.clientHeight < threshold;
    }
    function scrollToBottom(container) {
      if (!container) return;
      container.scrollTo({ top: container.scrollHeight, behavior: 'smooth' });
    }
    function scrollToBottomIfNearBottom() {
      if (isNearBottom(chatMessages)) scrollToBottom(chatMessages);
    }

    // --- Message rendering (isolated from transport)
    function appendMessage(role, text) {
      if (!text && role !== 'assistant') return;
      const div = document.createElement('div');
      div.className = 'message ' + role;
      div.textContent = text || '';
      chatWindow.appendChild(div);
      scrollToBottomIfNearBottom();
    }

    function createStreamingBubble() {
      const div = document.createElement('div');
      div.className = 'message assistant';
      div.textContent = '';
      chatWindow.appendChild(div);
      currentStreamingBubble = div;
      scrollToBottomIfNearBottom();
      return div;
    }

    function updateStreamingBubble(textChunk) {
      if (!currentStreamingBubble) return;
      currentStreamingBubble.textContent = textChunk;
      scrollToBottomIfNearBottom();
    }

    function finalizeStreamingBubble() {
      currentStreamingBubble = null;
    }

    function setStreamingBubbleError(message) {
      if (currentStreamingBubble) {
        currentStreamingBubble.className = 'message error';
        currentStreamingBubble.textContent = message || 'Error';
      }
      finalizeStreamingBubble();
    }

    // --- Session history
    async function loadSessionHistory() {
      try {
        const res = await fetch(`/api/chat/history?session_id=${encodeURIComponent(sessionId)}`);
        if (!res.ok) return;
        const data = await res.json();
        const list = data.history || [];
        if (list.length === 0) return;
        chatWindow.innerHTML = '';
        history = list;
        for (const msg of list) {
          if (msg.role) appendMessage(msg.role, msg.content || '');
        }
        if (history.length > 0) scrollToBottomIfNearBottom();
      } catch (_) {}
    }

    async function clearChat() {
      try {
        await fetch('/api/chat/clear', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ session_id: sessionId })
        });
      } catch (_) {}
      chatWindow.innerHTML = '';
      history = [];
    }

    // --- SSE: extract event type and data from one event block (strip "data:" prefixes, join lines)
    function parseSSEEvent(block) {
      const lines = block.split(/\r?\n/).filter(function (line) { return line.length > 0; });
      let event = '';
      const dataLines = [];
      for (const line of lines) {
        if (line.startsWith('event:')) {
          event = line.replace(/^event:\s*/, '').trim();
        } else if (line.startsWith('data:')) {
          dataLines.push(line.replace(/^data:\s?/, ''));
        }
      }
      return { event, data: dataLines.join('\n') };
    }

    // --- Single send path (form submit only; guarded by isSending)
    async function sendMessage() {
      if (isSending) return;
      const text = (messageInput.value || '').trim();
      if (!text) return;

      isSending = true;
      messageInput.value = '';
      sendBtn.disabled = true;
      appendMessage('user', text);
      history.push({ role: 'user', content: text });
      startThinking();
      createStreamingBubble();

      try {
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: text, history: history, session_id: sessionId })
        });

        if (!res.ok) {
          stopThinking();
          const err = await res.json().catch(function () { return {}; });
          setStreamingBubbleError(err.detail || 'Request failed');
          return;
        }

        if (!res.body) {
          stopThinking();
          setStreamingBubbleError('No response body');
          return;
        }

        const reader = res.body.getReader();
        const decoder = new TextDecoder('utf-8');
        let fullReply = '';
        let buffer = '';

        while (true) {
          const { value, done } = await reader.read();
          if (done) break;
          buffer += decoder.decode(value, { stream: true });
          const blocks = buffer.split(/\n\n+/);
          buffer = blocks.pop() || '';

          for (const block of blocks) {
            const trimmed = block.trim();
            if (!trimmed) continue;
            const { event, data } = parseSSEEvent(block);

            if (event === 'chunk') {
              fullReply += data;
              updateStreamingBubble(fullReply);
            } else if (event === 'done') {
              stopThinking();
              history.push({ role: 'assistant', content: fullReply || '' });
              finalizeStreamingBubble();
              return;
            } else if (event === 'error') {
              stopThinking();
              setStreamingBubbleError((data || '').trim() || 'Error');
              return;
            }
          }
        }

        // Flush remaining buffer as one event if present
        if (buffer.trim()) {
          const { event, data } = parseSSEEvent(buffer);
          if (event === 'chunk') {
            fullReply += data;
            updateStreamingBubble(fullReply);
          } else if (event === 'error') {
            stopThinking();
            setStreamingBubbleError((data || '').trim() || 'Error');
            return;
          }
        }

        stopThinking();
        history.push({ role: 'assistant', content: fullReply || '' });
        finalizeStreamingBubble();
      } catch (e) {
        stopThinking();
        setStreamingBubbleError('Network error: ' + (e && e.message ? e.message : 'Unknown error'));
      } finally {
        isSending = false;
        sendBtn.disabled = false;
      }
    }

    // --- Form submit only (Enter and button click both go through form)
    if (chatForm) {
      chatForm.addEventListener('submit', function (e) {
        e.preventDefault();
        sendMessage();
      });
    }

    clearBtn.addEventListener('click', function () {
      clearChat();
    });

    // Mode buttons
    modeButtons.forEach(function (btn) {
      btn.addEventListener('click', function () {
        modeButtons.forEach(function (b) { b.classList.remove('active'); });
        btn.classList.add('active');
        selectedMode = btn.getAttribute('data-mode') || 'system';
      });
    });

    loadSessionHistory();
  </script>
</body>
</html>
